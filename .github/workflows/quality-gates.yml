name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 9 * * 1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Bundle budget
        run: npm run check:bundle

      - name: Security baseline
        run: npm run audit:baseline
