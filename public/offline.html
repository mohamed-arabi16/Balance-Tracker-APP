<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4352ef" />
    <title>Balance Tracker - Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Outfit", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(135deg, #f8fafc, #eef2ff);
        color: #0f172a;
      }

      .card {
        width: min(480px, 100%);
        border: 1px solid #dbeafe;
        border-radius: 16px;
        padding: 24px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 20px;
        line-height: 1.5;
        color: #334155;
      }

      button {
        appearance: none;
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #ffffff;
        background: #4352ef;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.92;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(135deg, #0f172a, #1e293b);
          color: #f8fafc;
        }

        .card {
          background: #111827;
          border-color: #334155;
          box-shadow: none;
        }

        p {
          color: #cbd5e1;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        Balance Tracker cannot reach the network right now. Reconnect to sync your latest changes.
      </p>
      <button type="button" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
